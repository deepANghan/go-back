name: CI-CD pipeline

on:
    push:
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: pull codebase
              uses: actions/checkout@v6

            - name: setup go
              uses: actions/setup-go@v5
              with:
                go-version: "1.25.x"

            - name: test code
              run: go test ./tests
            
            - name: build output binary
              run: go build -o app .
            
            - name: setup ssh
              run: |
                   mkdir -p ~/.ssh
                   echo "${{secrets.SSH_KEY}}" > ~/.ssh/id_rsa
                   chmod 600 ~/.ssh/id_rsa

            - name: trust server
              run: |
                    ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

            - name: deploy output file to instance
              run: |
                    scp -i ~/.ssh/id_rsa app ${{secrets.USERNAME}}@${{secrets.SERVER_IP}}:/opt/backend/app
                    ssh -i ~/.ssh/id_rsa ${{secrets.USERNAME}}@${{secrets.SERVER_IP}} \
                    "sudo systemctl restart backend"


